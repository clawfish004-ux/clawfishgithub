name: Hourly AI Trigger

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Get Status from Firestore
        id: check_status
        run: |
          RESPONSE=$(curl -s "https://firestore.googleapis.com/v1/projects/ai-news-channel-d69be/databases/(default)/documents/clawfishaimews/dLGEejnpO6Bbt3Qqpr9o")
          
          # Status Reading (Safe mode)
          TT_ON=$(echo $RESPONSE | grep -o '"tt_auto_mode": [^,}]*' | cut -d' ' -f2 || echo "false")
          YT_ON=$(echo $RESPONSE | grep -o '"yt_auto_mode": [^,}]*' | cut -d' ' -f2 || echo "false")

          # Current Hour in Myanmar (UTC +6:30)
          CURRENT_HOUR=$(TZ='Asia/Yangon' date +'%H')
          echo "Current Myanmar Hour: $CURRENT_HOUR"

          # Time Logic for TikTok
          # Firestore ကလာတဲ့ string ထဲက နာရီကိုပဲ ဆွဲထုတ်ပြီး လက်ရှိနာရီနဲ့ တိုက်စစ်ခြင်း
          if echo $RESPONSE | grep -q "\"tt_time_[1-3]\": \"$CURRENT_HOUR:"; then
             echo "TT_MATCH=true" >> $GITHUB_ENV
          else
             echo "TT_MATCH=false" >> $GITHUB_ENV
          fi

          # Time Logic for YouTube
          if echo $RESPONSE | grep -q "\"yt_time_[1-3]\": \"$CURRENT_HOUR:"; then
             echo "YT_MATCH=true" >> $GITHUB_ENV
          else
             echo "YT_MATCH=false" >> $GITHUB_ENV
          fi

          echo "tt_on=$TT_ON" >> $GITHUB_ENV
          echo "yt_on=$YT_ON" >> $GITHUB_ENV

      - name: Run TikTok AI Process
        if: env.tt_on == 'true' && env.TT_MATCH == 'true'
        run: |
          echo "TikTok match found. Triggering AI Model..."

      - name: Run YouTube AI Process
        if: env.yt_on == 'true' && env.YT_MATCH == 'true'
        run: |
          echo "YouTube match found. Triggering AI Model..."
